# Synerion Bank Backend - Render Blueprint

services:
  - type: web
    name: synerion-bank-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci --only=production
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://synerion-bank.netlify.app
